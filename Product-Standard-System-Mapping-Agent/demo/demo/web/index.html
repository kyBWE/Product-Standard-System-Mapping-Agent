<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品-标准体系映射智能体</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-canvas:#050506;--bg-card:#0A0A0B;--bg-card-hover:#0F0F11;
  --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);
  --text-primary:#EDEDEF;--text-secondary:#8A8F98;--text-muted:#55585F;
  --accent:#6366F1;--accent-glow:rgba(99,102,241,0.15);--accent-soft:rgba(99,102,241,0.08);
  --green:#22C55E;--green-glow:rgba(34,197,94,0.15);
  --amber:#F59E0B;--amber-glow:rgba(245,158,11,0.15);
  --red:#EF4444;--red-glow:rgba(239,68,68,0.15);
  --purple:#A855F7;--purple-glow:rgba(168,85,247,0.15);
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
}
html{font-size:14px}
body{
  font-family:'Inter','Noto Sans SC',system-ui,sans-serif;
  background:var(--bg-canvas);color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;
  letter-spacing:-0.01em;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(99,102,241,0.08),transparent),
             radial-gradient(ellipse 60% 40% at 80% 100%,rgba(168,85,247,0.05),transparent);
  pointer-events:none;z-index:0;
}

.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px 32px 48px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:16px}
.logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 24px var(--accent-glow)}
.header-title{font-size:1.35rem;font-weight:700;letter-spacing:-0.03em}
.header-sub{font-size:0.8rem;color:var(--text-secondary);margin-top:2px}
.header-right{display:flex;gap:8px}
.badge{padding:4px 12px;border-radius:20px;font-size:0.72rem;font-weight:600;letter-spacing:0.02em;border:1px solid var(--border)}
.badge-green{color:var(--green);border-color:rgba(34,197,94,0.2);background:var(--green-glow)}
.badge-purple{color:var(--purple);border-color:rgba(168,85,247,0.2);background:var(--purple-glow)}

/* Grid */
.grid{display:grid;gap:20px;margin-bottom:24px}
.grid-main{grid-template-columns:1fr 1fr}
.grid-stats{grid-template-columns:repeat(5,1fr)}
.grid-bottom{grid-template-columns:1fr 1fr 1fr}

/* Card */
.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;position:relative;overflow:hidden;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.card:hover{border-color:var(--border-hover);box-shadow:0 0 30px rgba(0,0,0,0.3)}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
}
.card-title{font-size:0.78rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent-glow)}

/* Stat Card */
.stat-value{font-size:2rem;font-weight:700;letter-spacing:-0.03em;line-height:1}
.stat-label{font-size:0.75rem;color:var(--text-muted);margin-top:6px}
.stat-card .stat-value{background:linear-gradient(135deg,var(--text-primary),var(--text-secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Match Input */
.match-input-wrap{display:flex;gap:10px;margin-bottom:16px}
.match-input{
  flex:1;background:var(--bg-canvas);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 16px;color:var(--text-primary);font-size:0.95rem;font-family:inherit;
  outline:none;transition:border-color 0.2s;
}
.match-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.match-input::placeholder{color:var(--text-muted)}

.btn{
  padding:10px 20px;border-radius:var(--radius-sm);font-size:0.85rem;font-weight:600;
  border:1px solid var(--border);cursor:pointer;transition:all 0.2s;font-family:inherit;
  display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
.btn-primary:hover{background:#5558E6;box-shadow:0 0 30px var(--accent-glow)}
.btn-secondary{background:transparent;color:var(--text-secondary)}
.btn-secondary:hover{background:var(--bg-card-hover);color:var(--text-primary)}
.btn-secondary.active{background:var(--accent-soft);color:var(--accent);border-color:rgba(99,102,241,0.3)}

/* Result Card */
.result-empty{color:var(--text-muted);font-size:0.9rem;padding:24px 0;text-align:center}
.result-main{display:flex;align-items:center;gap:20px;margin-bottom:16px;padding:16px;background:var(--bg-canvas);border-radius:var(--radius-sm);border:1px solid var(--border)}
.result-product{font-size:1.1rem;font-weight:700;min-width:100px}
.result-arrow{color:var(--text-muted);font-size:1.2rem}
.result-category{font-size:1.1rem;font-weight:700;color:var(--accent)}
.result-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.result-tag{padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600}
.tag-matched{color:var(--green);background:var(--green-glow);border:1px solid rgba(34,197,94,0.2)}
.tag-low{color:var(--amber);background:var(--amber-glow);border:1px solid rgba(245,158,11,0.2)}
.tag-nomatch{color:var(--red);background:var(--red-glow);border:1px solid rgba(239,68,68,0.2)}
.tag-rag{color:var(--accent);background:var(--accent-soft);border:1px solid rgba(99,102,241,0.2)}
.tag-rerank{color:#38bdf8;background:rgba(56,189,248,0.12);border:1px solid rgba(56,189,248,0.2)}
.tag-pageindex{color:var(--purple);background:var(--purple-glow);border:1px solid rgba(168,85,247,0.2)}

.confidence-bar{height:4px;background:var(--bg-canvas);border-radius:2px;overflow:hidden;margin-top:12px}
.confidence-fill{height:100%;border-radius:2px;transition:width 0.6s ease}
.fill-high{background:linear-gradient(90deg,var(--green),#4ADE80)}
.fill-mid{background:linear-gradient(90deg,var(--amber),#FBBF24)}
.fill-low{background:linear-gradient(90deg,var(--red),#F87171)}

/* Candidates */
.candidates-list{margin-top:12px}
.candidate-row{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:var(--radius-xs);transition:background 0.15s;font-size:0.82rem}
.candidate-row:hover{background:var(--bg-card-hover)}
.candidate-rank{width:20px;height:20px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0}
.candidate-rank.leaf{background:var(--green-glow);color:var(--green)}
.candidate-name{flex:1;color:var(--text-secondary)}
.candidate-role{font-size:0.68rem;color:var(--text-muted);margin-left:6px}
.candidate-score{font-weight:600;color:var(--text-primary);font-variant-numeric:tabular-nums}
.candidate-score.muted{color:var(--text-muted);font-weight:500}

/* History */
.history-list{max-height:320px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.history-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.82rem}
.history-item:last-child{border-bottom:none}
.history-product{flex:1;font-weight:500}
.history-category{color:var(--accent);font-weight:500;min-width:60px}
.history-conf{font-variant-numeric:tabular-nums;color:var(--text-secondary);min-width:50px;text-align:right}
.history-status{min-width:70px;text-align:right}

/* Flow Visualization */
.flow-container{display:flex;align-items:center;justify-content:center;gap:0;padding:20px 0;flex-wrap:nowrap}
.flow-step{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 16px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--bg-canvas);
  min-width:90px;transition:all 0.3s;
}
.flow-step.active{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow);background:var(--accent-soft)}
.flow-step .step-icon{font-size:1.3rem}
.flow-step .step-label{font-size:0.68rem;color:var(--text-secondary);font-weight:500;text-align:center;white-space:nowrap}
.flow-step.active .step-label{color:var(--accent)}
.flow-arrow{color:var(--text-muted);font-size:0.9rem;margin:0 4px;flex-shrink:0}
.flow-arrow.active{color:var(--accent)}

/* Loading */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Responsive */
@media(max-width:900px){
  .grid-main,.grid-bottom{grid-template-columns:1fr}
  .grid-stats{grid-template-columns:repeat(3,1fr)}
  .flow-container{flex-wrap:wrap}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 1.5s ease infinite}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">&#x1F9E0;</div>
      <div>
        <div class="header-title">产品-标准体系映射智能体</div>
        <div class="header-sub">Product-Standard Taxonomy Mapping Agent</div>
      </div>
    </div>
    <div class="header-right">
      <span class="badge badge-green" id="statusBadge">● 系统就绪</span>
      <span class="badge badge-purple">v1.0</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid grid-stats" id="statsGrid">
    <div class="card stat-card"><div class="stat-value" id="statVec">-</div><div class="stat-label">向量索引节点</div></div>
    <div class="card stat-card"><div class="stat-value" id="statTxt">-</div><div class="stat-label">文本索引节点</div></div>
    <div class="card stat-card"><div class="stat-value" id="statMatch">-</div><div class="stat-label">已匹配记录</div></div>
    <div class="card stat-card"><div class="stat-value" id="statSyn">-</div><div class="stat-label">同义词更新</div></div>
    <div class="card stat-card"><div class="stat-value" id="statExp">-</div><div class="stat-label">扩展建议</div></div>
  </div>

  <!-- Flow Visualization -->
  <div class="card" style="margin-bottom:24px">
    <div class="card-title"><span class="dot"></span>匹配流程可视化</div>
    <div class="flow-container" id="flowContainer">
      <div class="flow-step" id="flowInput"><span class="step-icon">&#x1F4E5;</span><span class="step-label">输入产品名</span></div>
      <div class="flow-arrow" id="arrow1">&#x276F;</div>
      <div class="flow-step" id="flowRecall"><span class="step-icon">&#x1F50D;</span><span class="step-label">粗召回</span></div>
      <div class="flow-arrow" id="arrow2">&#x276F;</div>
      <div class="flow-step" id="flowFine"><span class="step-icon">&#x1F9E0;</span><span class="step-label">LLM精匹配</span></div>
      <div class="flow-arrow" id="arrow3">&#x276F;</div>
      <div class="flow-step" id="flowResult"><span class="step-icon">&#x2705;</span><span class="step-label">输出结果</span></div>
      <div class="flow-arrow" id="arrow4">&#x276F;</div>
      <div class="flow-step" id="flowEvolve"><span class="step-icon">&#x1F504;</span><span class="step-label">自进化</span></div>
    </div>
  </div>

  <!-- Main Area -->
  <div class="grid grid-main">
    <!-- Match Panel -->
    <div class="card">
      <div class="card-title"><span class="dot"></span>智能匹配</div>
      <div class="match-input-wrap">
        <input class="match-input" id="productInput" placeholder="输入产品名称，如：汽油、大米、印刷机..." autocomplete="off">
        <button class="btn btn-primary" id="matchBtn" onclick="doMatch()">&#x1F50D; 匹配</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="btn btn-secondary active" id="btnRag" onclick="setEngine('rag')">RAG 向量</button>
        <button class="btn btn-secondary" id="btnRagRerank" onclick="setEngine('rag_rerank')">RAG+Rerank</button>
        <button class="btn btn-secondary" id="btnPi" onclick="setEngine('pageindex')">PageIndex</button>
        <button class="btn btn-secondary" id="btnPiLlm" onclick="setEngine('pageindex_force_llm')">PageIndex 逐层LLM</button>
      </div>
      <div id="matchResult">
        <div class="result-empty">输入产品名称开始匹配</div>
      </div>
    </div>

    <!-- Candidates Panel -->
    <div class="card">
      <div class="card-title"><span class="dot"></span><span id="candidatesTitle">候选节点详情</span></div>
      <div id="candidatesPanel">
        <div class="result-empty">匹配后显示候选节点</div>
      </div>
    </div>
  </div>

  <!-- Bottom Area -->
  <div class="grid grid-bottom">
    <!-- Match History -->
    <div class="card">
      <div class="card-title"><span class="dot"></span>匹配历史</div>
      <div class="history-list" id="historyList">
        <div class="result-empty">暂无记录</div>
      </div>
    </div>

    <!-- Synonym History -->
    <div class="card">
      <div class="card-title"><span class="dot"></span>同义词更新记录</div>
      <div class="history-list" id="synonymList">
        <div class="result-empty">暂无记录</div>
      </div>
    </div>

    <!-- Expansion History -->
    <div class="card">
      <div class="card-title"><span class="dot"></span>体系扩展建议</div>
      <div class="history-list" id="expansionList">
        <div class="result-empty">暂无记录</div>
      </div>
    </div>
  </div>
</div>

<script>
let currentEngine = 'rag';

function setEngine(eng) {
  currentEngine = eng;
  document.getElementById('btnRag').classList.toggle('active', eng === 'rag');
  document.getElementById('btnRagRerank').classList.toggle('active', eng === 'rag_rerank');
  document.getElementById('btnPi').classList.toggle('active', eng === 'pageindex');
  document.getElementById('btnPiLlm').classList.toggle('active', eng === 'pageindex_force_llm');
}

function buildMatchPayload(name) {
  if (currentEngine === 'rag' || currentEngine === 'rag_rerank') {
    return { product_name: name, engine: currentEngine };
  }
  const payload = { product_name: name, engine: 'pageindex' };
  if (currentEngine === 'pageindex_force_llm') payload.pageindex_mode = 'force_llm';
  return payload;
}

document.getElementById('productInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doMatch();
});

function setFlowActive(step) {
  const steps = ['flowInput','flowRecall','flowFine','flowResult','flowEvolve'];
  const arrows = ['arrow1','arrow2','arrow3','arrow4'];
  steps.forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.toggle('active', i <= step);
  });
  arrows.forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.toggle('active', i < step);
  });
}

async function doMatch() {
  const name = document.getElementById('productInput').value.trim();
  if (!name) return;

  const btn = document.getElementById('matchBtn');
  const resultDiv = document.getElementById('matchResult');
  const candDiv = document.getElementById('candidatesPanel');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 匹配中...';
  resultDiv.innerHTML = '<div class="result-empty"><span class="spinner"></span> 正在执行匹配流程...</div>';
  candDiv.innerHTML = '<div class="result-empty"><span class="spinner"></span> 等待候选节点...</div>';

  setFlowActive(0);
  document.getElementById('statusBadge').innerHTML = '&#x25CF; 匹配中';
  document.getElementById('statusBadge').className = 'badge badge-purple';

  try {
    // Animate flow steps
    await delay(300); setFlowActive(1);
    await delay(500); setFlowActive(2);
    await delay(300);

    const resp = await fetch('/api/match', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(buildMatchPayload(name))
    });

    await delay(200); setFlowActive(3);
    await delay(300); setFlowActive(4);

    const data = await resp.json();

    if (data.error) {
      resultDiv.innerHTML = `<div class="result-empty" style="color:var(--red)">&#x26A0; ${data.error}</div>`;
      return;
    }

    // Main result
    const statusClass = data.match_status === 'MATCHED' ? 'tag-matched' :
                        data.match_status === 'LOW_CONFIDENCE' ? 'tag-low' : 'tag-nomatch';
    const statusText = data.match_status === 'MATCHED' ? '已匹配' :
                       data.match_status === 'LOW_CONFIDENCE' ? '低置信度' : '无匹配';
    const engTag = data.engine_type === 'RAG_VECTOR' ? 'tag-rag'
      : data.engine_type === 'RAG_RERANK' ? 'tag-rerank' : 'tag-pageindex';
    const engText = data.engine_type === 'RAG_VECTOR' ? 'RAG'
      : data.engine_type === 'RAG_RERANK' ? 'RAG+Rerank'
      : (data.pageindex_mode === 'force_llm' ? 'PageIndex 逐层LLM' : 'PageIndex');
    const confClass = data.confidence >= 0.5 ? 'fill-high' : data.confidence >= 0.3 ? 'fill-mid' : 'fill-low';

    resultDiv.innerHTML = `
      <div class="result-main fade-in">
        <div class="result-product">${esc(data.product_name)}</div>
        <div class="result-arrow">&#x2192;</div>
        <div class="result-category">${data.matched_category_id || '无匹配'}</div>
      </div>
      <div class="result-meta fade-in">
        <span class="result-tag ${statusClass}">${statusText}</span>
        <span class="result-tag ${engTag}">${engText}</span>
        <span class="result-tag" style="color:var(--text-secondary);background:var(--bg-canvas);border:1px solid var(--border)">
          置信度 ${data.confidence.toFixed(4)}
        </span>
        <span class="result-tag" style="color:var(--text-secondary);background:var(--bg-canvas);border:1px solid var(--border)">
          用时 ${formatElapsed(data.elapsed_ms)}
        </span>
        ${data.llm_participated
          ? `<span class="result-tag tag-matched">${data.engine_type === 'RAG_RERANK' ? 'Rerank已参与' : 'LLM已参与'}</span>`
          : `<span class="result-tag tag-low">${data.engine_type === 'RAG_RERANK' ? 'Rerank未参与' : 'LLM未参与'}</span>`}
      </div>
      <div class="confidence-bar"><div class="confidence-fill ${confClass}" style="width:${Math.min(data.confidence * 100, 100)}%"></div></div>
    `;

    // Candidates / Path
    const isPageIndex = data.engine_type === 'PAGE_INDEX';
    const hasPath = isPageIndex && data.candidates.some(c => c.path_total > 0);
    document.getElementById('candidatesTitle').textContent = hasPath ? '匹配路径' : '候选节点详情';

    if (data.candidates && data.candidates.length > 0) {
      let html = '<div class="candidates-list">';
      data.candidates.forEach((c, i) => {
        if (hasPath) {
          const role = c.path_depth === 1 ? '根节点'
            : c.is_match_target ? '叶子 · 命中'
            : '中间层';
          const rankClass = c.is_match_target ? 'candidate-rank leaf' : 'candidate-rank';
          const scoreHtml = c.is_match_target
            ? `<div class="candidate-score">${c.final_confidence.toFixed(4)}</div>`
            : `<div class="candidate-score muted">L${c.path_depth}</div>`;
          html += `<div class="candidate-row fade-in" style="animation-delay:${i * 50}ms">
            <div class="${rankClass}">${c.path_depth}</div>
            <div class="candidate-name">${esc(c.category_name)} <span style="color:var(--text-muted)">#${c.category_id}</span><span class="candidate-role">${role}</span></div>
            ${scoreHtml}
          </div>`;
        } else {
          html += `<div class="candidate-row fade-in" style="animation-delay:${i * 50}ms">
            <div class="candidate-rank">${i + 1}</div>
            <div class="candidate-name">${esc(c.category_name)} <span style="color:var(--text-muted)">#${c.category_id}</span></div>
            <div class="candidate-score">${c.final_confidence.toFixed(4)}</div>
          </div>`;
        }
      });
      html += '</div>';
      candDiv.innerHTML = html;
    } else {
      candDiv.innerHTML = `<div class="result-empty">${hasPath ? '无匹配路径' : '无候选节点'}</div>`;
    }

    document.getElementById('statusBadge').innerHTML = '&#x25CF; 就绪';
    document.getElementById('statusBadge').className = 'badge badge-green';

    // Refresh histories
    loadHistory();
    loadSynonyms();
    loadExpansions();
    loadStats();

  } catch (err) {
    resultDiv.innerHTML = `<div class="result-empty" style="color:var(--red)">&#x26A0; 请求失败: ${err.message}</div>`;
    document.getElementById('statusBadge').innerHTML = '&#x25CF; 错误';
    document.getElementById('statusBadge').className = 'badge badge-purple';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '&#x1F50D; 匹配';
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatElapsed(ms) {
  if (ms === undefined || ms === null) return '-';
  if (ms < 1000) return `${ms} ms`;
  return `${(ms / 1000).toFixed(2)} s`;
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    if (d.error) return;
    document.getElementById('statVec').textContent = d.vector_count?.toLocaleString() || '0';
    document.getElementById('statTxt').textContent = d.text_count?.toLocaleString() || '0';
    document.getElementById('statMatch').textContent = d.match_count?.toLocaleString() || '0';
    document.getElementById('statSyn').textContent = d.synonym_count?.toLocaleString() || '0';
    document.getElementById('statExp').textContent = d.expansion_count?.toLocaleString() || '0';
  } catch(e) {}
}

async function loadHistory() {
  try {
    const r = await fetch('/api/match_history?limit=30');
    const d = await r.json();
    if (!Array.isArray(d) || d.length === 0) return;
    const el = document.getElementById('historyList');
    el.innerHTML = d.map(item => {
      const sc = item.match_status === 'MATCHED' ? 'tag-matched' : item.match_status === 'LOW_CONFIDENCE' ? 'tag-low' : 'tag-nomatch';
      const st = item.match_status === 'MATCHED' ? '匹配' : item.match_status === 'LOW_CONFIDENCE' ? '低置信' : '无匹配';
      return `<div class="history-item">
        <div class="history-product">${esc(item.product_name)}</div>
        <div class="history-category">${item.matched_category_id || '-'}</div>
        <div class="history-conf">${item.confidence.toFixed(2)}</div>
        <div class="history-status"><span class="result-tag ${sc}" style="font-size:0.68rem">${st}</span></div>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function loadSynonyms() {
  try {
    const r = await fetch('/api/synonym_history?limit=20');
    const d = await r.json();
    if (!Array.isArray(d) || d.length === 0) return;
    const el = document.getElementById('synonymList');
    el.innerHTML = d.map(item => {
      return `<div class="history-item">
        <div class="history-product" style="color:var(--green)">${esc(item.new_synonym)}</div>
        <div class="history-category">#${esc(item.category_id)}</div>
        <div class="history-conf">${item.llm_verified ? '&#x2705;' : '&#x2753;'}</div>
      </div>`;
    }).join('');
  } catch(e) {}
}

async function loadExpansions() {
  try {
    const r = await fetch('/api/expansion_history?limit=20');
    const d = await r.json();
    if (!Array.isArray(d) || d.length === 0) return;
    const el = document.getElementById('expansionList');
    el.innerHTML = d.map(item => {
      const sc = item.status === 'PENDING_REVIEW' ? 'tag-low' : item.status === 'APPROVED' ? 'tag-matched' : 'tag-nomatch';
      const st = item.status === 'PENDING_REVIEW' ? '待审核' : item.status === 'APPROVED' ? '已通过' : '已拒绝';
      return `<div class="history-item">
        <div class="history-product">${esc(item.product_name)}</div>
        <div class="history-category" style="color:var(--amber)">${esc(item.suggested_category_name || '-')}</div>
        <div class="history-status"><span class="result-tag ${sc}" style="font-size:0.68rem">${st}</span></div>
      </div>`;
    }).join('');
  } catch(e) {}
}

// Initial load
loadStats();
loadHistory();
loadSynonyms();
loadExpansions();
</script>
</body>
</html>
